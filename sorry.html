<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffb7b2; /* A warm, cute background color */
            color: #333;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
            transition: background-color 1s ease;
        }

        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pure CSS Panda */
        .panda {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            animation: bounce 2s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .head {
            position: absolute;
            width: 180px;
            height: 150px;
            background-color: #fff;
            border-radius: 50% 50% 45% 45%;
            top: 30px;
            left: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .ear {
            position: absolute;
            width: 70px;
            height: 70px;
            background-color: #2c3e50;
            border-radius: 50%;
            top: 15px;
            z-index: 1;
        }

        .ear.left { left: -5px; transform: rotate(-30deg); }
        .ear.right { right: -5px; transform: rotate(30deg); }

        .eye {
            position: absolute;
            width: 50px;
            height: 65px;
            background-color: #2c3e50;
            border-radius: 50% 50% 45% 45%;
            top: 45px;
            transform: rotate(-15deg);
        }

        .eye.right {
            right: 35px;
            transform: rotate(15deg);
        }

        .eye.left {
            left: 35px;
        }

        .pupil {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #fff;
            border-radius: 50%;
            top: 15px;
            left: 15px;
            animation: lookAround 4s infinite;
        }

        .eye.right .pupil { left: 20px; }

        @keyframes lookAround {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, 0px); }
            75% { transform: translate(5px, 5px); }
        }

        /* Tear */
        .tear {
            position: absolute;
            width: 12px;
            height: 15px;
            background-color: #74b9ff;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            top: 100px;
            left: 45px;
            opacity: 1;
            animation: cry 2s infinite linear;
            z-index: 3;
        }

        .tear.right {
            left: auto;
            right: 45px;
            animation-delay: 1s;
        }

        @keyframes cry {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(40px) scale(0.8); opacity: 0; }
            100% { transform: translateY(40px) scale(0.8); opacity: 0; }
        }

        .nose {
            position: absolute;
            width: 20px;
            height: 12px;
            background-color: #2c3e50;
            border-radius: 50%;
            top: 105px;
            left: 80px;
        }

        .mouth {
            position: absolute;
            width: 30px;
            height: 15px;
            border: 3px solid transparent;
            border-top-color: #2c3e50;
            border-radius: 50%;
            top: 125px;
            left: 72px;
            transition: all 0.5s;
        }

        /* Happy Panda State */
        .happy-panda {
            animation: bounceHappy 0.5s infinite alternate !important;
        }

        @keyframes bounceHappy {
            from { transform: translateY(0); }
            to { transform: translateY(-20px) scale(1.05); }
        }

        .happy-panda .mouth {
            border-top-color: transparent;
            border-bottom-color: #2c3e50;
            top: 110px;
            height: 20px;
        }

        .happy-panda .tear {
            display: none;
        }

        .happy-panda .pupil {
            animation: none;
            top: 25px;
            height: 8px;
            width: 20px;
            border-radius: 50%;
            border-top: 4px solid #fff;
            background: transparent;
        }
        
        .happy-panda .eye.right .pupil {
            left: 15px;
        }

        /* Rosy cheeks */
        .cheek {
            position: absolute;
            width: 25px;
            height: 15px;
            background-color: #ff9999;
            border-radius: 50%;
            top: 105px;
            opacity: 0;
            transition: opacity 0.5s;
            filter: blur(2px);
        }
        .cheek.left { left: 20px; }
        .cheek.right { right: 20px; }
        .happy-panda .cheek { opacity: 0.8; }

        h1 {
            font-size: 5rem;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: pulseText 2s infinite alternate;
            letter-spacing: -2px;
            margin-top: 0;
            font-weight: 800;
        }

        @keyframes pulseText {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        p {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 16px 36px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ff8c8c;
            background-color: #ffffff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            background-color: #fff9f9;
        }

        .btn:active {
            transform: translateY(0) scale(0.95);
        }

        /* Hearts background */
        .heart {
            position: absolute;
            color: #ff4d4d;
            font-size: 20px;
            opacity: 0;
            animation: floatHeart linear forwards;
            z-index: 1;
            text-shadow: 0 0 5px rgba(255, 77, 77, 0.5);
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pure CSS Animated Panda -->
        <div class="panda" id="panda">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="head">
                <div class="eye left">
                    <div class="pupil"></div>
                </div>
                <div class="eye right">
                    <div class="pupil"></div>
                </div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="nose"></div>
                <div class="mouth sad"></div>
                <div class="tear left"></div>
                <div class="tear right"></div>
            </div>
        </div>
        
        <h1 id="mainText">Sorry</h1>
        <p id="subText">Please forgive me! I promise to do better. 🥺</p>
        <button class="btn" id="forgiveBtn">Forgive Me?</button>
    </div>

    <script>
        const btn = document.getElementById('forgiveBtn');
        const panda = document.getElementById('panda');
        const mainText = document.getElementById('mainText');
        const subText = document.getElementById('subText');
        let isForgiven = false;
        let heartInterval;

        const triggerHappy = () => {
            if (isForgiven) return;
            isForgiven = true;

            // Update button
            btn.textContent = 'YAY! Thank You! 🥰';
            btn.style.color = '#fff';
            btn.style.backgroundColor = '#ff6b81';
            btn.style.transform = 'scale(1.1)';
            btn.style.boxShadow = '0 10px 30px rgba(255, 107, 129, 0.4)';
            
            // Make panda happy!
            panda.classList.add('happy-panda');
            
            // Update texts
            mainText.textContent = 'Yaaay!';
            subText.textContent = 'You are the absolute best! Thank you so much! ❤️';
            
            // Change background to a warmer, happier color
            document.body.style.backgroundColor = '#ffd1ba';

            // Create hearts explosion
            createHearts(20);
            heartInterval = setInterval(() => createHearts(5), 600);
        };

        btn.addEventListener('click', triggerHappy);
        panda.addEventListener('click', triggerHappy); // Clicking the panda also works!

        function createHearts(amount) {
            const emojis = ['❤️', '💖', '✨', '🥰', '🐼'];
            for (let i = 0; i < amount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                const size = Math.random() * 25 + 15;
                heart.style.fontSize = `${size}px`;
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.bottom = `-50px`;
                heart.style.animationDuration = `${Math.random() * 3 + 2.5}s`;
                heart.style.animationDelay = `${Math.random() * 0.5}s`;
                
                document.body.appendChild(heart);
                
                // Remove heart from DOM after animation completes
                setTimeout(() => {
                    if (heart.parentNode) {
                        heart.parentNode.removeChild(heart);
                    }
                }, 6000);
            }
        }
    </script>
</body>
</html>
